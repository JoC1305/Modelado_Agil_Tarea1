server {
  listen ${PORT};
  listen [::]:${PORT};
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend-capocannoniere-env.eba-9sdjrvpx.us-east-2.elasticbeanstalk.com/api/;
    proxy_http_version 1.1;
    proxy_set_header Host backend-capocannoniere-env.eba-9sdjrvpx.us-east-2.elasticbeanstalk.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
