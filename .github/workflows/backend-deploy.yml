name: Deploy Backend to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**' # Solo se activa si hay cambios dentro de la carpeta del backend

jobs:
  deploy:
    name: Build and Push to AWS
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Autenticarse en AWS usando los secretos guardados
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.SECRET_ACCES_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 3. Iniciar sesión en AWS ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # 4. Construir la imagen Docker, etiquetarla y subirla a ECR
    - name: Build, Tag, and Push Image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: backendfastapi # Debe ser igual al nombre que pusiste en AWS ECR
        IMAGE_TAG: latest
      run: |
        cd backend
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Generate Deployment Package
      run: |
        cd backend
        zip -r ../deploy.zip ./*

    - name: Deploy to Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v21
      with:
        aws_access_key: ${{ secrets.ACCESS_KEY }}
        aws_secret_key: ${{ secrets.SECRET_ACCES_KEY }}
        application_name: 'backend-capocannoniere'
        environment_name: 'Backend-capocannoniere-env'
        version_label: ${{ github.sha }}
        region: us-east-2
        deployment_package: deploy.zip # 👈 Le pasamos todo el paquete comprimido con el Dockerfile real
        use_existing_version_if_available: true
